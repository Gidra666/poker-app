name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip python3 python3-pip

    - name: Unzip project
      run: unzip poker_project.zip

    - name: Create APK
      run: |
        mkdir output
        echo "Poker App APK" > output/poker-app.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: poker-app
        path: output/
